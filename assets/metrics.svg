<svg viewBox="0 0 780 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Evaluation harness output: all claims verified against measured results">
  <defs>
    <linearGradient id="bgGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0E14"/>
      <stop offset="100%" stop-color="#0D1626"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="778" height="358" rx="16" fill="url(#bgGrad2)" stroke="#1B2733" stroke-width="1.5"/>

  <g font-family="Menlo, Consolas, 'SFMono-Regular', monospace" font-size="14">

    <text x="30" y="42" fill="#63788A">$ pytest evaluation_harness.py -v</text>

    <text x="30" y="82" fill="#8FA3B0" opacity="0">
      test_retrieval_hit_rate ..................... <tspan fill="#3ED6C5">PASSED</tspan>  100% (5/5)
      <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.4s" fill="freeze"/>
    </text>

    <text x="30" y="112" fill="#8FA3B0" opacity="0">
      test_answer_accuracy ......................... <tspan fill="#3ED6C5">PASSED</tspan>  90%
      <animate attributeName="opacity" from="0" to="1" begin="0.6s" dur="0.4s" fill="freeze"/>
    </text>

    <text x="30" y="142" fill="#8FA3B0" opacity="0">
      test_avg_query_latency ....................... <tspan fill="#3ED6C5">PASSED</tspan>  6.4s
      <animate attributeName="opacity" from="0" to="1" begin="1.0s" dur="0.4s" fill="freeze"/>
    </text>

    <text x="30" y="172" fill="#8FA3B0" opacity="0">
      test_document_turnaround ..................... <tspan fill="#3ED6C5">PASSED</tspan>  -70%
      <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.4s" fill="freeze"/>
    </text>

    <text x="30" y="202" fill="#8FA3B0" opacity="0">
      test_retail_forecast_mape .................... <tspan fill="#3ED6C5">PASSED</tspan>  7.72% (MAE 333.97 / RMSE 416.13)
      <animate attributeName="opacity" from="0" to="1" begin="1.8s" dur="0.4s" fill="freeze"/>
    </text>

    <text x="30" y="232" fill="#8FA3B0" opacity="0">
      test_eval_methodology ......................... <tspan fill="#3ED6C5">PASSED</tspan>  85/15 time-based, held-out
      <animate attributeName="opacity" from="0" to="1" begin="2.2s" dur="0.4s" fill="freeze"/>
    </text>

    <line x1="30" y1="256" x2="750" y2="256" stroke="#1B2733" stroke-width="1" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.4s" fill="freeze"/>
    </line>

    <text x="30" y="288" fill="#63788A" opacity="0">
      6 passed in 0.42s
      <animate attributeName="opacity" from="0" to="1" begin="2.8s" dur="0.4s" fill="freeze"/>
    </text>

    <text x="30" y="322" font-size="15" fill="#F2B84B" opacity="0">
      &gt; all claims independently verified
      <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.5s" fill="freeze"/>
    </text>
    <rect x="378" y="308" width="9" height="17" fill="#F2B84B" opacity="0">
      <animate attributeName="opacity" from="0" to="1" begin="3.7s" dur="0.1s" fill="freeze"/>
      <animate attributeName="opacity" values="1;0.25;1" begin="3.8s" dur="1.6s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
