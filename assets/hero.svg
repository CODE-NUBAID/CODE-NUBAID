<svg viewBox="0 0 920 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Nubaid Uddin — AI Engineer, RAG systems and agentic AI">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0E14"/>
      <stop offset="100%" stop-color="#0D1626"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2E4550"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="918" height="258" rx="16" fill="url(#bgGrad)" stroke="#1B2733" stroke-width="1.5"/>

  <!-- ============ LEFT: identity terminal ============ -->
  <g font-family="Menlo, Consolas, 'SFMono-Regular', monospace">
    <text x="36" y="54" font-size="13" fill="#63788A">$ whoami</text>

    <text x="36" y="94" font-size="32" font-weight="700" fill="#3ED6C5">NUBAID UDDIN</text>
    <rect x="296" y="70" width="11" height="27" fill="#3ED6C5">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>

    <text x="36" y="126" font-size="15" fill="#E6EDF3">AI Engineer — RAG Systems &amp; Agentic AI</text>
    <text x="36" y="152" font-size="12.5" fill="#63788A">B.Tech CSE · Jamia Hamdard · CGPA 8.77/10</text>
    <text x="36" y="174" font-size="12.5" fill="#63788A">Delhi, India</text>

    <text x="36" y="222" font-size="12" fill="#3D4C59">$ cat philosophy.txt</text>
    <text x="36" y="242" font-size="12.5" fill="#F2B84B">"measure it or don't claim it"</text>
  </g>

  <line x1="432" y1="26" x2="432" y2="234" stroke="#1B2733" stroke-width="1"/>

  <!-- ============ RIGHT: live pipeline trace ============ -->
  <g font-family="Menlo, Consolas, 'SFMono-Regular', monospace">
    <text x="464" y="28" font-size="11.5" fill="#63788A" letter-spacing="1">// live query trace — RAG pipeline</text>

    <!-- connectors -->
    <line x1="588" y1="118" x2="632" y2="80" stroke="#2E4550" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="716" y1="78" x2="752" y2="114" stroke="#2E4550" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="752" y1="140" x2="710" y2="180" stroke="#2E4550" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- nodes -->
    <g>
      <rect x="500" y="112" width="90" height="36" rx="8" fill="#0F1721" stroke="#3ED6C5" stroke-width="1.3"/>
      <text x="545" y="135" font-size="12" fill="#E6EDF3" text-anchor="middle">Query</text>
    </g>
    <g>
      <rect x="620" y="46" width="100" height="36" rx="8" fill="#0F1721" stroke="#3ED6C5" stroke-width="1.3"/>
      <text x="670" y="69" font-size="12" fill="#E6EDF3" text-anchor="middle">FAISS Retrieval</text>
    </g>
    <g>
      <rect x="744" y="108" width="100" height="36" rx="8" fill="#0F1721" stroke="#3ED6C5" stroke-width="1.3"/>
      <text x="794" y="131" font-size="12" fill="#E6EDF3" text-anchor="middle">Gemini Reasoning</text>
    </g>
    <g>
      <rect x="618" y="180" width="112" height="36" rx="8" fill="#0F1721" stroke="#F2B84B" stroke-width="1.3"/>
      <text x="674" y="203" font-size="12" fill="#E6EDF3" text-anchor="middle">Grounded Answer</text>
    </g>

    <!-- verified pulse -->
    <text x="738" y="204" font-size="15" font-weight="700" fill="#F2B84B">✓
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.6;0.72;0.9;1" dur="4.4s" repeatCount="indefinite"/>
    </text>

    <!-- moving packet -->
    <circle r="4.5" fill="#3ED6C5">
      <animateMotion dur="4.4s" repeatCount="indefinite" path="M 545 130 L 670 64 L 794 126 L 674 198"/>
      <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.05;0.5;0.92;1" dur="4.4s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
